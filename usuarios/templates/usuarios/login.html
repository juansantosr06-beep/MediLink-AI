{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediLink - Acceso Seguro AI</title>

    <link rel="stylesheet" href="{% static 'usuarios/css/base.css' %}">
    <link rel="stylesheet" href="{% static 'usuarios/css/login.css' %}">
    <link rel="stylesheet" href="{% static 'usuarios/css/registro.css' %}">
</head>
<body>

    <div class="main-container">
        <div class="glass-panel">

            <div class="login-header">
                <img src="{% static 'usuarios/images/logo.png' %}" alt="Logo MediLink" class="logo-img">
                <p class="subtitle">IA PARA TU SALUD</p>
            </div>

            <form method="post">
                {% csrf_token %}

                <div class="input-group">
                    <label for="username">Usuario / Matrícula</label>
                    <input type="text" id="username" name="username" placeholder="Ej: 22290700" required>
                </div>

                <div class="input-group">
                    <label for="password">Contraseña Cifrada</label>
    <div class="password-wrapper">
        <input type="password" id="password" name="password" placeholder="••••••••" required>
        <button type="button" id="peekPassword" class="toggle-btn-peek">
            <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
            </svg>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-login-ai">
                    <span>INGRESAR</span>
                    <div class="btn-shine"></div>
                </button>
            </form>

            <div class="login-footer">
                <a href="#">¿Olvidaste tu contraseña?</a>
                <p style="margin-top: 15px; font-size: 13px; color: #a0acba;">
        ¿No tienes cuenta? <a href="{% url 'registro' %}" style="display: inline; margin: 0; color: #00b894; font-weight: bold;">Regístrate aquí</a>
    </p>
            </div>
        </div>

        <div class="bg-circle blue-circle"></div>
        <div class="bg-circle green-circle"></div>
    </div>

    <script>
        const peekBtn = document.querySelector('#peekPassword');
    const passwordInput = document.querySelector('#password');

    // Función para mostrar
    const showPass = () => {
        passwordInput.type = 'text';
        peekBtn.classList.add('active');
    };

    // Función para ocultar
    const hidePass = () => {
        passwordInput.type = 'password';
        peekBtn.classList.remove('active');
    };

    // Eventos de mouse
    peekBtn.addEventListener('mousedown', showPass);
    peekBtn.addEventListener('mouseup', hidePass);
    peekBtn.addEventListener('mouseleave', hidePass);

    // Eventos para pantallas táctiles (Celulares)
    peekBtn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        showPass();
    });
    peekBtn.addEventListener('touchend', hidePass);
    </script>

</body>
</html>
